<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>
      Easyco
    </title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1> Welcome to Easyco Fammmm!!!!</h1>
    <p> Post your fav recipes and let the world enjoy it!!!!</p>
    <script type="module" src="script.js"></script>
  </body>
  <hr>
  <h2>Share your masterpiece 😋😋😋😋😋</h2>
  <div class="form-container">
    <h2> LOVEBOMB THE WORLD!!!!!</h2>
    <form>
      <label>Masterpiece's name:</label>
      <input type="text" id="name" placeholder="Chocolate Chip Cookies"><br>

      <label>Where are the pieces from????</label>
      <input type="text" id="place" placeholder="India"><br>

      <label>Pieces of the masterpiece:</label>
      <textarea rows="4" cols="60" id="pieces" placeholder="1: Love 😘😘😘😘"></textarea><br>

      <label>How to make the masterpiece:</label>
      <textarea rows="4" cols="60" id="how" placeholder="Step 1: Add love 😘😘😘😘"></textarea><br>

      <label for="picture" class="selfie">Selfie with the masterpiece 😎😎😎😎</label>
      <input type="file" id="picture" accept="image/*" class="default-photo"><br>

      <button type="button" class="lovebomb" id="lovebomb">✨✨✨✨Lovebomb✨✨✨✨</button>
    </form>
  </div>
</html>
